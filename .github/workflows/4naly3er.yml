name: 4naly3er Report

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    analyzer_4naly3er:
        name: 4naly3er Gas Optimization Report
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"

            - name: Install 4naly3er (pinned, rules preserved)
              run: |
                  git clone https://github.com/Picodes/4naly3er
                  cd 4naly3er
                  # Pin the revision for deterministic CI runs
                  git checkout 04c4dbb9bbf59846b0a70acae3bc4aefebac9920
                  # Preserved all NC rules (including uselessOverride.ts) for completeness.
                  # If a suppression is required, a proper tracked issue will be created.
                  corepack enable
                  yarn install

            - name: Run 4naly3er on src/
              run: |
                  cd 4naly3er
                  yarn analyze ../contracts/src ../4naly3er-report.md

            - name: Upload 4naly3er report
              uses: actions/upload-artifact@v4
              with:
                  name: 4naly3er-report
                  path: 4naly3er-report.md
