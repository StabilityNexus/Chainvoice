name: Frontend Tests

on:
  pull_request:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend-tests.yml
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend-tests.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Jest tests with coverage
        run: npm run test:ci
