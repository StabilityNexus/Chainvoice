# Builds and deploys the Vite frontend for PRs to the "pr-preview" directory
# on the gh-pages branch, and posts a comment with the preview URL to the PR.
# Also removes the preview from gh-pages when the PR is closed.

name: Deploy PR preview to gh-pages

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'frontend/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─── Deploy preview on PR open / update ──────────────────────────────────
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: pr-preview-deploy-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f "./frontend/package-lock.json" ]; then
            npm ci
          else
            npm install
          fi
        working-directory: ./frontend

      - name: Build preview site
        run: npm run build -- --base /pr-preview/pr-${{ github.event.pull_request.number }}/
        working-directory: ./frontend
        env:
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          VITE_CONTRACT_ADDRESS_11155111: ${{ secrets.VITE_CONTRACT_ADDRESS_11155111 }}
          VITE_CONTRACT_ADDRESS_61: ${{ secrets.VITE_CONTRACT_ADDRESS_61 }}
          VITE_CONTRACT_ADDRESS_137: ${{ secrets.VITE_CONTRACT_ADDRESS_137 }}

      - name: Add .nojekyll
        run: touch ./frontend/dist/.nojekyll

      - name: Deploy preview to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          destination_dir: pr-preview/pr-${{ github.event.pull_request.number }}
          keep_files: true
          commit_message: "deploy: preview for PR #${{ github.event.pull_request.number }} (${{ github.sha }})"

      - name: Post or update preview URL comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.sha.substring(0, 7);
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;

            // Determine the preview URL based on whether a custom domain exists.
            // For the main org repo with a custom domain:
            //   https://chainvoice.stability.nexus/pr-preview/pr-<N>/
            // For forks or repos without a custom domain:
            //   https://<owner>.github.io/<repo>/pr-preview/pr-<N>/
            const previewUrl = `https://${repoOwner}.github.io/${repoName}/pr-preview/pr-${prNumber}/`;

            const marker = '<!-- pr-preview-bot -->';
            const body =
              `${marker}\n` +
              `### 🔍 PR Preview\n\n` +
              `| | |\n` +
              `|---|---|\n` +
              `| **Preview URL** | ${previewUrl} |\n` +
              `| **Commit** | \`${sha}\` |\n` +
              `| **Status** | ✅ Deployed |\n\n` +
              `> This preview is updated on every commit and will be removed when the PR is closed.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: repoOwner,
              repo: repoName,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: repoOwner,
                repo: repoName,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: repoOwner,
                repo: repoName,
                issue_number: prNumber,
                body,
              });
            }

  # ─── Clean up preview when PR is closed (merged or abandoned) ────────────
  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: pr-preview-cleanup-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove preview directory from gh-pages branch
        run: |
          # Guard: if gh-pages doesn't exist yet there is nothing to clean up.
          git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1 || {
            echo "gh-pages branch does not exist — nothing to clean up."
            exit 0
          }

          # Fetch and create a local tracking branch.
          git fetch origin gh-pages:gh-pages --depth=1
          git checkout gh-pages

          PR_DIR="pr-preview/pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -r -f "$PR_DIR"
            git commit -m "cleanup: remove preview for PR #${{ github.event.pull_request.number }}"
            git push --set-upstream origin gh-pages
          else
            echo "Preview directory '$PR_DIR' not found — nothing to clean up."
          fi

      - name: Update PR comment to indicate removal
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- pr-preview-bot -->';
            const body =
              `${marker}\n` +
              `### 🔍 PR Preview\n\n` +
              `| | |\n` +
              `|---|---|\n` +
              `| **Status** | 🗑️ Preview removed (PR closed) |\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }
